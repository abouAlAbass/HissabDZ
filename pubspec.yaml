name: hissab_dz
description: "HissabDZ - Premium Invoice Management Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^13.2.0
  
  # Database (Drift)
  drift: ^2.16.0
  drift_sqflite: ^2.0.1
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.2
  path: ^1.8.3
  
  # Models & Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  uuid: ^4.3.3
  
  # UI & Utils
  shimmer: ^3.0.0
  reactive_forms: ^16.0.0
  
  # PDF & Share
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^7.2.2
  file_selector: ^1.0.3
  open_filex: ^4.5.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.5
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation Tools
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  drift_dev: ^2.16.0
  freezed: ^2.4.7
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/iconHissabDZ.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/iconHissabDZ.jpg
    - assets/fonts/Amiri-Regular.ttf
    - assets/fonts/Amiri-Bold.ttf
    - assets/fonts/Amiri-Italic.ttf
    - assets/fonts/Amiri-BoldItalic.ttf




